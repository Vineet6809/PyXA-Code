name: windows-tests

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-mvp.txt
          pip install pytest
      - name: Run unit tests
        run: python -m pytest -q
      - name: Run Windows integration tests
        run: python -m pytest -q -m windows_integration
